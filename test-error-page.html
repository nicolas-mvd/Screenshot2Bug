<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot2Bug Console Error Test</title>
    <style>
      body {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172026;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #166a6a;
        color: white;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      code {
        background: #eef1f4;
        border-radius: 6px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <h1>Screenshot2Bug Console Error Test</h1>
    <p>
      This page intentionally creates console errors so you can verify the extension captures
      them in a bug report.
    </p>

    <button id="manualErrorButton">Trigger console.error</button>

    <p>
      It also tries to load a missing image:
      <code>missing-image-for-screenshot2bug.png</code>
    </p>
    <img src="./missing-image-for-screenshot2bug.png" alt="Intentional missing asset" />

    <script>
      console.error("Screenshot2Bug test: console.error on page load");

      window.setTimeout(() => {
        throw new Error("Screenshot2Bug test: thrown async error");
      }, 750);

      Promise.reject(new Error("Screenshot2Bug test: unhandled promise rejection"));

      document.querySelector("#manualErrorButton").addEventListener("click", () => {
        console.error("Screenshot2Bug test: manual button error", {
          clickedAt: new Date().toISOString()
        });
      });
    </script>
  </body>
</html>
